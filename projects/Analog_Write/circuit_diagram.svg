<svg width="1200" height="700" viewBox="0 0 1200 700" xmlns="http://www.w3.org/2000/svg">
  <rect width="1200" height="700" fill="#0b1220"/>

  <text x="600" y="60" text-anchor="middle" font-family="Arial, sans-serif" font-size="38" font-weight="700" fill="#ffffff">STM32 Blue Pill analogWrite PWM Circuit</text>
  <text x="600" y="100" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" fill="#93c5fd">PA6 controls external LED brightness using TIM3 Channel 1 PWM</text>

  <!-- STM32 board -->
  <rect x="90" y="165" width="400" height="370" rx="22" fill="#123b6d" stroke="#60a5fa" stroke-width="4"/>
  <text x="290" y="220" text-anchor="middle" font-family="Arial, sans-serif" font-size="30" font-weight="700" fill="#ffffff">STM32 BLUE PILL</text>
  <text x="290" y="255" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" fill="#bfdbfe">Arduino IDE + STM32 Core</text>

  <!-- PWM pin -->
  <rect x="430" y="305" width="100" height="52" rx="7" fill="#1e293b" stroke="#facc15" stroke-width="3"/>
  <text x="480" y="339" text-anchor="middle" font-family="Arial, sans-serif" font-size="23" font-weight="700" fill="#facc15">PA6</text>
  <text x="290" y="330" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" fill="#e5e7eb">TIM3_CH1 PWM output</text>

  <!-- GND pin -->
  <rect x="430" y="445" width="100" height="52" rx="7" fill="#1e293b" stroke="#22c55e" stroke-width="3"/>
  <text x="480" y="479" text-anchor="middle" font-family="Arial, sans-serif" font-size="23" font-weight="700" fill="#22c55e">GND</text>

  <!-- PWM wire -->
  <path d="M530 331 H650" stroke="#facc15" stroke-width="7" fill="none"/>
  <text x="590" y="305" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" fill="#fde68a">PWM signal</text>

  <!-- Resistor -->
  <rect x="650" y="298" width="180" height="66" rx="12" fill="#3f2d1f" stroke="#fb923c" stroke-width="4"/>
  <text x="740" y="326" text-anchor="middle" font-family="Arial, sans-serif" font-size="21" font-weight="700" fill="#ffffff">220 Ω to 330 Ω</text>
  <text x="740" y="351" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" fill="#fed7aa">Current-limiting resistor</text>

  <!-- LED wire and LED -->
  <path d="M830 331 H915" stroke="#facc15" stroke-width="7" fill="none"/>
  <circle cx="970" cy="331" r="48" fill="#111827" stroke="#38bdf8" stroke-width="4"/>
  <circle cx="970" cy="331" r="27" fill="#ef4444"/>
  <text x="970" y="405" text-anchor="middle" font-family="Arial, sans-serif" font-size="25" font-weight="700" fill="#ffffff">LED</text>
  <text x="970" y="432" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" fill="#cbd5e1">Anode (+) from resistor</text>

  <!-- Ground return -->
  <path d="M970 379 V471 H530" stroke="#22c55e" stroke-width="7" fill="none"/>
  <text x="790" y="502" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" fill="#bbf7d0">LED cathode (-) to GND</text>

  <!-- PWM explanation -->
  <rect x="150" y="565" width="900" height="95" rx="14" fill="#111827" stroke="#94a3b8" stroke-width="2"/>
  <text x="600" y="598" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#ffffff">analogWrite(PA6, value)</text>
  <text x="600" y="630" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" fill="#e5e7eb">0 = LED OFF   •   127 ≈ 50% duty cycle   •   255 = full brightness</text>
  <text x="600" y="654" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" fill="#93c5fd">PWM changes average LED power by rapidly switching PA6 between LOW and HIGH.</text>
</svg>