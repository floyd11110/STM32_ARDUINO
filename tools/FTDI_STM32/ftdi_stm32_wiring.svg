<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760">
  <rect width="1200" height="760" fill="#f7fbff"/>
  <style>
    .t{font-family:Arial,sans-serif;fill:#153f7a}.h{font-size:34px;font-weight:700}.s{font-size:20px;font-weight:600}.b{font-size:20px;font-weight:700}.n{font-size:18px}.w{fill:#fff;stroke:#2f6ed3;stroke-width:3}.hdr{fill:#2f6ed3}.white{fill:#fff;font-family:Arial,sans-serif;font-size:18px;font-weight:700}.pin{font-family:Arial,sans-serif;font-size:18px;font-weight:700}
  </style>
  <text x="600" y="55" text-anchor="middle" class="t h">Paano Ikonekta ang FTDI sa STM32 Blue Pill</text>
  <text x="600" y="90" text-anchor="middle" class="t s">Para sa Serial Monitor at UART Upload</text>

  <rect x="55" y="135" rx="18" width="360" height="300" class="w"/>
  <rect x="85" y="115" rx="10" width="250" height="42" class="hdr"/>
  <text x="210" y="142" text-anchor="middle" class="white">FTDI ADAPTER (3.3V)</text>
  <rect x="95" y="190" rx="14" width="205" height="120" fill="#c62828" stroke="#8f1515" stroke-width="3"/>
  <rect x="55" y="220" rx="6" width="55" height="60" fill="#d9dde4" stroke="#9299a4" stroke-width="2"/>
  <rect x="135" y="220" rx="5" width="72" height="50" fill="#222"/>
  <g fill="#111"><rect x="305" y="190" width="28" height="17"/><rect x="305" y="232" width="28" height="17"/><rect x="305" y="274" width="28" height="17"/></g>
  <text x="345" y="205" class="pin">TX</text><text x="345" y="247" class="pin">RX</text><text x="345" y="289" class="pin">GND</text>

  <rect x="785" y="135" rx="18" width="360" height="300" class="w"/>
  <rect x="815" y="115" rx="10" width="300" height="42" class="hdr"/>
  <text x="965" y="142" text-anchor="middle" class="white">STM32 BLUE PILL</text>
  <rect x="900" y="180" rx="14" width="145" height="210" fill="#165bc1" stroke="#0b3d91" stroke-width="3"/>
  <rect x="948" y="166" rx="4" width="48" height="20" fill="#d9dde4"/>
  <rect x="945" y="225" width="54" height="54" fill="#202020" transform="rotate(18 972 252)"/>
  <ellipse cx="972" cy="312" rx="37" ry="13" fill="#d9dde4"/>
  <rect x="948" y="342" rx="4" width="42" height="24" fill="#f2d031"/>
  <text x="1000" y="360" class="pin" fill="#fff">BOOT0</text>
  <rect x="1035" y="195" rx="5" width="70" height="28" fill="#fff" stroke="#111" stroke-width="3"/>
  <text x="1070" y="215" text-anchor="middle" class="pin">GND</text>
  <rect x="1035" y="258" rx="5" width="80" height="28" fill="#fff" stroke="#20a64b" stroke-width="3"/>
  <text x="1075" y="278" text-anchor="middle" class="pin" fill="#20a64b">PA10</text>
  <rect x="1035" y="320" rx="5" width="70" height="28" fill="#fff" stroke="#1d67d8" stroke-width="3"/>
  <text x="1070" y="340" text-anchor="middle" class="pin" fill="#1d67d8">PA9</text>

  <line x1="420" y1="200" x2="780" y2="200" stroke="#20a64b" stroke-width="6"/>
  <polygon points="780,200 760,190 760,210" fill="#20a64b"/>
  <text x="600" y="185" text-anchor="middle" class="pin" fill="#20a64b">FTDI TX → STM32 PA10 (RX1)</text>

  <line x1="420" y1="265" x2="780" y2="265" stroke="#1d67d8" stroke-width="6"/>
  <polygon points="780,265 760,255 760,275" fill="#1d67d8"/>
  <text x="600" y="250" text-anchor="middle" class="pin" fill="#1d67d8">FTDI RX → STM32 PA9 (TX1)</text>

  <line x1="420" y1="330" x2="780" y2="330" stroke="#111" stroke-width="6"/>
  <polygon points="780,330 760,320 760,340" fill="#111"/>
  <text x="600" y="315" text-anchor="middle" class="pin">FTDI GND → STM32 GND</text>

  <rect x="55" y="470" rx="16" width="350" height="105" fill="#fff4d8" stroke="#efc24b" stroke-width="3"/>
  <text x="80" y="515" class="t b">Cross connection ito:</text>
  <text x="80" y="545" class="n" font-family="Arial">TX papuntang RX, RX papuntang TX.</text>

  <rect x="425" y="470" rx="16" width="350" height="105" fill="#fff0f0" stroke="#ed6b6b" stroke-width="3"/>
  <text x="450" y="515" class="t b" fill="#c23b22">3.3V logic lang</text>
  <text x="450" y="545" class="n" font-family="Arial">para safe sa STM32.</text>

  <rect x="795" y="470" rx="16" width="350" height="105" fill="#eef7ff" stroke="#6aa2f2" stroke-width="3"/>
  <text x="820" y="510" class="t b">Power ng STM32:</text>
  <text x="820" y="540" class="n" font-family="Arial">USB, ST-LINK, o regulated supply.</text>
  <text x="820" y="565" class="n" font-family="Arial">Huwag nang ikabit ang FTDI VCC kung powered na.</text>

  <rect x="55" y="610" rx="18" width="540" height="115" class="w"/>
  <rect x="55" y="610" rx="18" width="540" height="38" class="hdr"/>
  <text x="325" y="636" text-anchor="middle" class="white">Para sa upload gamit ang FTDI</text>
  <text x="80" y="680" class="n" font-family="Arial">1. BOOT0 = 1   2. Reset   3. Upload sa tamang COM port</text>
  <text x="80" y="710" class="n" font-family="Arial">4. Pagkatapos, BOOT0 = 0 at reset ulit</text>

  <rect x="615" y="610" rx="18" width="530" height="115" class="w"/>
  <rect x="615" y="610" rx="18" width="530" height="38" class="hdr"/>
  <text x="880" y="636" text-anchor="middle" class="white">Quick check</text>
  <text x="645" y="680" class="n" font-family="Arial">✓ Tama ang COM port   ✓ Pareho ang baud rate</text>
  <text x="645" y="710" class="n" font-family="Arial">✓ Common ang GND   ✓ 3.3V compatible ang FTDI</text>
</svg>